# Render Blueprint - IRECSTEM 2026
# Deploy to: https://render.com

services:
  - type: web
    name: irecstem2026
    runtime: php
    plan: free
    buildCommand: |
      echo "No build required for PHP"
    startCommand: |
      php -S $HOST:$PORT
    headers:
      - path: /*
        name: Security Headers
        value: |
          X-Frame-Options: SAMEORIGIN
          X-Content-Type-Options: nosniff
          X-XSS-Protection: 1; mode=block
    routes:
      - path: /*
        type: rewrite
        destination: /public/index.php


# Environment variables
envVars:
  - key: PHP_VERSION
    value: "8.2"
